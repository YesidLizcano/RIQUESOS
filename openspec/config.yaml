schema: spec-driven

context: |
  Tech stack: Next.js (Server Actions / API Routes) + Prisma + SQLite
  Architecture: Fullstack backoffice (local LAN deployment, Tailscale VPN for remote)
  Testing: None detected (greenfield project, no source code yet)
  Style: Spanish-language PRD; business logic in Spanish; code identifiers in English

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas